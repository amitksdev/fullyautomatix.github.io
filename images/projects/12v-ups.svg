<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">12V UPS Module</title>
  <desc id="d">Synthetic illustration of a 12V uninterruptible power supply with battery backup</desc>
  
  <!-- Background -->
  <rect width="1200" height="620" fill="#0d1117"/>
  
  <!-- Main UPS enclosure -->
  <rect x="180" y="100" width="840" height="420" rx="20" fill="#1a2332" stroke="#2d3d54" stroke-width="5"/>
  
  <!-- Front panel accent -->
  <rect x="200" y="120" width="800" height="380" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  
  <!-- Battery level indicator bar graph -->
  <g id="battery-display">
    <text x="320" y="180" fill="#7d8590" font-size="18" font-family="IBM Plex Mono, monospace">BATTERY LEVEL</text>
    
    <!-- Bar segments -->
    <rect x="320" y="200" width="60" height="30" rx="4" fill="#238636" stroke="#2ea043" stroke-width="2"/>
    <rect x="390" y="200" width="60" height="30" rx="4" fill="#238636" stroke="#2ea043" stroke-width="2"/>
    <rect x="460" y="200" width="60" height="30" rx="4" fill="#238636" stroke="#2ea043" stroke-width="2"/>
    <rect x="530" y="200" width="60" height="30" rx="4" fill="#238636" stroke="#2ea043" stroke-width="2"/>
    <rect x="600" y="200" width="60" height="30" rx="4" fill="#30363d" stroke="#484f58" stroke-width="2"/>
    <rect x="670" y="200" width="60" height="30" rx="4" fill="#30363d" stroke="#484f58" stroke-width="2"/>
    
    <!-- Percentage label -->
    <text x="780" y="225" fill="#3fb950" font-size="32" font-family="IBM Plex Mono, monospace" font-weight="bold">67%</text>
  </g>
  
  <!-- Status LEDs section -->
  <g id="status-leds">
    <!-- Power LED -->
    <circle cx="340" cy="290" r="18" fill="#238636" stroke="#2ea043" stroke-width="2"/>
    <circle cx="340" cy="290" r="12" fill="#3fb950" opacity="0.9"/>
    <text x="370" y="300" fill="#7d8590" font-size="18" font-family="IBM Plex Mono, monospace">POWER</text>
    
    <!-- Battery Mode LED -->
    <circle cx="580" cy="290" r="18" fill="#9e6a03" stroke="#d29922" stroke-width="2"/>
    <circle cx="580" cy="290" r="12" fill="#f0883e" opacity="0.9"/>
    <text x="610" y="300" fill="#7d8590" font-size="18" font-family="IBM Plex Mono, monospace">BATTERY</text>
    
    <!-- Fault LED (off) -->
    <circle cx="820" cy="290" r="18" fill="#21262d" stroke="#484f58" stroke-width="2"/>
    <circle cx="820" cy="290" r="12" fill="#6e7681" opacity="0.3"/>
    <text x="850" y="300" fill="#6e7681" font-size="18" font-family="IBM Plex Mono, monospace">FAULT</text>
  </g>
  
  <!-- On/Off Switch -->
  <g id="power-switch">
    <rect x="530" y="350" width="140" height="80" rx="10" fill="#21262d" stroke="#484f58" stroke-width="3"/>
    <circle cx="600" cy="390" r="32" fill="#238636" stroke="#2ea043" stroke-width="3"/>
    <text x="575" y="400" fill="#ffffff" font-size="32" font-family="IBM Plex Mono, monospace" font-weight="bold">I</text>
    <text x="560" y="470" fill="#7d8590" font-size="16" font-family="IBM Plex Mono, monospace">POWER</text>
  </g>
  
  <!-- Input Port (DC IN) -->
  <g id="input-port">
    <rect x="240" y="360" width="100" height="60" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="3"/>
    <circle cx="290" cy="390" r="18" fill="#21262d" stroke="#58a6ff" stroke-width="2"/>
    <circle cx="290" cy="390" r="10" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
    <circle cx="290" cy="390" r="4" fill="#58a6ff"/>
    <text x="220" y="445" fill="#58a6ff" font-size="16" font-family="IBM Plex Mono, monospace" font-weight="bold">DC IN</text>
    <text x="212" y="463" fill="#7d8590" font-size="13" font-family="IBM Plex Mono, monospace">14.4V 2A</text>
  </g>
  
  <!-- Output Port (DC OUT) -->
  <g id="output-port">
    <rect x="860" y="360" width="100" height="60" rx="8" fill="#0d1117" stroke="#3fb950" stroke-width="3"/>
    <circle cx="910" cy="390" r="18" fill="#21262d" stroke="#3fb950" stroke-width="2"/>
    <circle cx="910" cy="390" r="10" fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
    <circle cx="910" cy="390" r="4" fill="#3fb950"/>
    <text x="834" y="445" fill="#3fb950" font-size="16" font-family="IBM Plex Mono, monospace" font-weight="bold">DC OUT</text>
    <text x="843" y="463" fill="#7d8590" font-size="13" font-family="IBM Plex Mono, monospace">12V 3A</text>
  </g>
  
  <!-- Battery Pack Indicator -->
  <g id="battery-icon">
    <rect x="420" y="345" width="70" height="40" rx="6" fill="#21262d" stroke="#7d8590" stroke-width="2"/>
    <rect x="490" y="357" width="8" height="16" rx="2" fill="#7d8590"/>
    <rect x="428" y="353" width="16" height="24" rx="3" fill="#3fb950"/>
    <rect x="448" y="353" width="16" height="24" rx="3" fill="#3fb950"/>
    <rect x="468" y="353" width="16" height="24" rx="3" fill="#238636"/>
    <text x="412" y="405" fill="#7d8590" font-size="12" font-family="IBM Plex Mono, monospace">Li-Ion 3S2P</text>
  </g>
  
  <!-- Bottom label -->
  <text x="420" y="560" fill="#7d8590" font-size="36" font-family="IBM Plex Mono, monospace">12V UPS MODULE</text>
</svg>
