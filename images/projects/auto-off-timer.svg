<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">Auto-Off Timer module</title>
  <desc id="d">Synthetic illustration of an auto-off timer control module with display and relay output</desc>
  
  <!-- Background -->
  <rect width="1200" height="620" fill="#0d1117"/>
  
  <!-- Main enclosure -->
  <rect x="120" y="80" width="960" height="460" rx="24" fill="#1a2332" stroke="#2d3d54" stroke-width="4"/>
  
  <!-- Digital display panel -->
  <rect x="180" y="150" width="460" height="180" rx="12" fill="#0a0e14" stroke="#1e2835" stroke-width="3"/>
  
  <!-- Seven-segment style timer display "30:00" -->
  <g fill="#00ff88" font-family="IBM Plex Mono, monospace" font-size="120" font-weight="bold">
    <text x="220" y="280">30:00</text>
  </g>
  
  <!-- Display label -->
  <text x="320" y="320" fill="#4a6074" font-size="18" font-family="IBM Plex Mono, monospace">MINUTES</text>
  
  <!-- Time preset buttons -->
  <g id="preset-buttons">
    <!-- 15 min button -->
    <rect x="190" y="360" width="100" height="60" rx="8" fill="#2d3d54" stroke="#3f5a7a" stroke-width="2"/>
    <text x="227" y="395" fill="#e6edf3" font-size="24" font-family="IBM Plex Mono, monospace" text-anchor="middle">15</text>
    
    <!-- 30 min button (active) -->
    <rect x="310" y="360" width="100" height="60" rx="8" fill="#1f6feb" stroke="#58a6ff" stroke-width="3"/>
    <text x="347" y="395" fill="#ffffff" font-size="24" font-family="IBM Plex Mono, monospace" text-anchor="middle">30</text>
    
    <!-- 60 min button -->
    <rect x="430" y="360" width="100" height="60" rx="8" fill="#2d3d54" stroke="#3f5a7a" stroke-width="2"/>
    <text x="467" y="395" fill="#e6edf3" font-size="24" font-family="IBM Plex Mono, monospace" text-anchor="middle">60</text>
  </g>
  
  <!-- Rotary dial control -->
  <circle cx="800" cy="240" r="110" fill="#1a2332" stroke="#3f5a7a" stroke-width="4"/>
  <circle cx="800" cy="240" r="90" fill="#0d1117" stroke="#2d3d54" stroke-width="2"/>
  
  <!-- Dial markings -->
  <g stroke="#4a6074" stroke-width="3">
    <line x1="800" y1="140" x2="800" y2="160" />
    <line x1="870" y1="185" x2="855" y2="198" />
    <line x1="900" y1="240" x2="880" y2="240" />
    <line x1="870" y1="295" x2="855" y2="282" />
    <line x1="800" y1="340" x2="800" y2="320" />
    <line x1="730" y1="295" x2="745" y2="282" />
    <line x1="700" y1="240" x2="720" y2="240" />
    <line x1="730" y1="185" x2="745" y2="198" />
  </g>
  
  <!-- Dial pointer -->
  <line x1="800" y1="240" x2="800" y2="170" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
  <circle cx="800" cy="240" r="18" fill="#00ff88"/>
  
  <!-- Timer IC representation (C005) -->
  <rect x="670" y="390" width="120" height="80" rx="6" fill="#21262d" stroke="#444c56" stroke-width="2"/>
  <text x="710" y="425" fill="#58a6ff" font-size="22" font-family="IBM Plex Mono, monospace">C005</text>
  <text x="688" y="450" fill="#7d8590" font-size="14" font-family="IBM Plex Mono, monospace">TIMER IC</text>
  
  <!-- Relay indicator -->
  <rect x="820" y="390" width="120" height="80" rx="6" fill="#21262d" stroke="#444c56" stroke-width="2"/>
  <rect x="845" y="410" width="70" height="40" rx="4" fill="#0d1117" stroke="#7d8590" stroke-width="1.5"/>
  <text x="850" y="455" fill="#7d8590" font-size="14" font-family="IBM Plex Mono, monospace">RELAY OUT</text>
  
  <!-- Status LEDs -->
  <g id="status-leds">
    <!-- Power LED -->
    <circle cx="980" cy="180" r="16" fill="#238636" stroke="#2ea043" stroke-width="2"/>
    <circle cx="980" cy="180" r="10" fill="#3fb950" opacity="0.8"/>
    <text x="930" y="220" fill="#7d8590" font-size="16" font-family="IBM Plex Mono, monospace">POWER</text>
    
    <!-- Active LED -->
    <circle cx="980" cy="280" r="16" fill="#9e6a03" stroke="#d29922" stroke-width="2"/>
    <circle cx="980" cy="280" r="10" fill="#f0883e" opacity="0.8"/>
    <text x="925" y="320" fill="#7d8590" font-size="16" font-family="IBM Plex Mono, monospace">ACTIVE</text>
  </g>
  
  <!-- Bottom label -->
  <text x="360" y="520" fill="#7d8590" font-size="32" font-family="IBM Plex Mono, monospace">AUTO-OFF TIMER</text>
</svg>
