<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Background -->
  <rect width="400" height="300" fill="#1d2723"/>
  
  <!-- Enclosure -->
  <rect x="140" y="90" width="120" height="100" rx="8" fill="#2a3833"/>
  <rect x="145" y="95" width="110" height="90" rx="6" fill="#3a4843"/>
  
  <!-- D1 Mini Board (visible through cutout) -->
  <rect x="165" y="115" width="70" height="40" rx="2" fill="#2a52be"/>
  
  <!-- ESP8266 Chip -->
  <rect x="180" y="125" width="40" height="20" rx="1" fill="#1a1a1a"/>
  <text x="200" y="137" font-family="monospace" font-size="7" fill="#f9c80e" text-anchor="middle">ESP8266</text>
  
  <!-- WiFi Signals (left - receiving) -->
  <g opacity="0.7">
    <path d="M 100 140 Q 120 130 140 140" stroke="#00c2a8" stroke-width="2" fill="none"/>
    <path d="M 90 140 Q 120 120 150 140" stroke="#00c2a8" stroke-width="2" fill="none"/>
    <path d="M 80 140 Q 120 110 160 140" stroke="#00c2a8" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Router Icon (source) -->
  <rect x="30" y="130" width="40" height="30" rx="4" fill="#3a4843"/>
  <rect x="45" y="125" width="10" height="5" rx="1" fill="#f9c80e"/>
  <circle cx="40" cy="145" r="2" fill="#00c2a8"/>
  <circle cx="50" cy="145" r="2" fill="#00c2a8"/>
  <circle cx="60" cy="145" r="2" fill="#cc0000"/>
  <text x="50" y="175" font-family="monospace" font-size="8" fill="#bdd0c6" text-anchor="middle">Router</text>
  
  <!-- External Antenna -->
  <rect x="255" y="80" width="8" height="50" rx="2" fill="#8a8a8a"/>
  <circle cx="259" cy="75" r="5" fill="#ffd700"/>
  
  <!-- Antenna connector -->
  <rect x="252" y="130" width="14" height="8" rx="2" fill="#c0c0c0"/>
  
  <!-- U.FL Cable -->
  <path d="M 235 135 Q 245 135 252 134" stroke="#1a1a1a" stroke-width="2" fill="none"/>
  
  <!-- WiFi Signals (right - broadcasting) -->
  <g opacity="0.7">
    <path d="M 260 140 Q 280 130 300 140" stroke="#f9c80e" stroke-width="3" fill="none"/>
    <path d="M 260 140 Q 290 120 320 140" stroke="#f9c80e" stroke-width="3" fill="none"/>
    <path d="M 260 140 Q 300 110 340 140" stroke="#f9c80e" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Client Device -->
  <rect x="330" y="130" width="35" height="25" rx="2" fill="#3a4843"/>
  <rect x="333" y="133" width="29" height="19" rx="1" fill="#0a0f0d"/>
  <line x1="347.5" y1="155" x2="347.5" y2="160" stroke="#3a4843" stroke-width="2"/>
  <rect x="343" y="160" width="9" height="3" rx="1" fill="#3a4843"/>
  <text x="347.5" y="178" font-family="monospace" font-size="8" fill="#bdd0c6" text-anchor="middle">Client</text>
  
  <!-- Status LED -->
  <circle cx="200" cy="170" r="3" fill="#00cc00"/>
  
  <!-- USB Port -->
  <rect x="195" y="185" width="10" height="5" rx="1" fill="#c0c0c0"/>
  
  <!-- Ventilation slots -->
  <g fill="#1a2320">
    <rect x="150" y="100" width="2" height="10"/>
    <rect x="155" y="100" width="2" height="10"/>
    <rect x="150" y="115" width="2" height="10"/>
    <rect x="155" y="115" width="2" height="10"/>
  </g>
  
  <!-- Labels -->
  <text x="200" y="225" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f9c80e" text-anchor="middle">Mini WiFi Repeater</text>
  <text x="200" y="245" font-family="Arial, sans-serif" font-size="12" fill="#bdd0c6" text-anchor="middle">ESP8266 D1 Mini • External Antenna</text>
  
  <!-- Range indicator -->
  <text x="50" y="200" font-family="monospace" font-size="9" fill="#00c2a8" text-anchor="middle">IN</text>
  <line x1="70" y1="195" x2="130" y2="195" stroke="#00c2a8" stroke-width="1.5" marker-end="url(#arrow1)"/>
  
  <text x="350" y="200" font-family="monospace" font-size="9" fill="#f9c80e" text-anchor="middle">OUT</text>
  <line x1="270" y1="195" x2="330" y2="195" stroke="#f9c80e" stroke-width="2" marker-end="url(#arrow2)"/>
  
  <defs>
    <marker id="arrow1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#00c2a8"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f9c80e"/>
    </marker>
  </defs>
</svg>
